<style>
  .bk-card-4 {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at 20% 20%, #ff8ab7 0%, transparent 50%),
      radial-gradient(circle at 80% 30%, #ffe66d 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, #8be3ff 0%, transparent 60%),
      linear-gradient(160deg, #ffd4e8, #e8d4ff);
    color: #4a1a55;
    padding: 64px 56px;
    border-radius: 32px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(255, 138, 183, 0.45);
    position: relative;
    overflow: hidden;
  }
  .bk-card-4 .bk4-icons {
    font-size: 110px;
    line-height: 1;
    margin-bottom: 8px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .bk-card-4 .bk4-icons span {
    display: inline-block;
    animation: bk4-bounce 1.4s cubic-bezier(0.5, -0.4, 0.5, 1.4) infinite;
  }
  .bk-card-4 .bk4-icons span:nth-child(2) { animation-delay: 0.2s; }
  .bk-card-4 .bk4-icons span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bk4-bounce {
    0%, 100% { transform: translateY(0)    rotate(-6deg); }
    50%      { transform: translateY(-22px) rotate(6deg); }
  }
  .bk-card-4 h1 {
    font-size: 64px;
    margin: 16px 0 8px;
    font-weight: 900;
    letter-spacing: -1px;
    color: #d8377a;
    text-shadow: 3px 3px 0 #fff;
  }
  .bk-card-4 .bk4-sub {
    font-size: 26px;
    margin: 0 0 32px;
    font-weight: 600;
  }
  .bk-card-4 .bk4-price {
    display: inline-block;
    background: #d8377a;
    color: #fff;
    font-size: 56px;
    font-weight: 900;
    padding: 14px 32px;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(216, 55, 122, 0.5);
    transform: rotate(-3deg);
  }
  .bk-card-4 .bk4-sparkle {
    position: absolute;
    font-size: 28px;
    animation: bk4-twinkle 1.6s ease-in-out infinite;
  }
  .bk-card-4 .bk4-sparkle.s1 { top: 12%; left: 8%; animation-delay: 0s; }
  .bk-card-4 .bk4-sparkle.s2 { top: 18%; right: 10%; animation-delay: 0.4s; }
  .bk-card-4 .bk4-sparkle.s3 { bottom: 14%; left: 12%; animation-delay: 0.8s; }
  .bk-card-4 .bk4-sparkle.s4 { bottom: 22%; right: 8%; animation-delay: 1.2s; }
  @keyframes bk4-twinkle {
    0%, 100% { transform: scale(0.6); opacity: 0.3; }
    50%      { transform: scale(1.2); opacity: 1; }
  }
</style>
<div class="bk-card-4">
  <span class="bk4-sparkle s1">✨</span>
  <span class="bk4-sparkle s2">⭐</span>
  <span class="bk4-sparkle s3">⭐</span>
  <span class="bk4-sparkle s4">✨</span>
  <div class="bk4-icons">
    <span>🍩</span>
    <span>🧁</span>
    <span>🍪</span>
  </div>
  <h1>Kinder-Naschstation</h1>
  <p class="bk4-sub">Donut, Muffin oder Keks — du darfst wählen!</p>
  <div class="bk4-price">1,50&nbsp;€</div>
</div>
