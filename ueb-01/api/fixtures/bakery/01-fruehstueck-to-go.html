<style>
  .bk-card-1 {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #3b2516 0%, #8c5a3a 50%, #c08855 100%);
    color: #fff7e6;
    padding: 72px 56px;
    border-radius: 28px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }
  .bk-card-1::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255, 220, 150, 0.25), transparent 60%);
    pointer-events: none;
  }
  .bk-card-1 .bk1-eyebrow {
    text-transform: uppercase;
    letter-spacing: 6px;
    font-size: 14px;
    opacity: 0.7;
    margin: 0 0 12px;
  }
  .bk-card-1 .bk1-icons {
    font-size: 120px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 12px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .bk-card-1 .bk1-cup {
    display: inline-block;
    animation: bk1-breathe 2.6s ease-in-out infinite;
  }
  @keyframes bk1-breathe {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-6px) scale(1.04); }
  }
  .bk-card-1 h1 {
    font-size: 72px;
    margin: 16px 0 8px;
    font-weight: 800;
    letter-spacing: -2px;
  }
  .bk-card-1 .bk1-sub {
    font-size: 26px;
    opacity: 0.88;
    margin: 0 0 32px;
    font-weight: 400;
  }
  .bk-card-1 .bk1-price {
    display: inline-block;
    background: #ffd84d;
    color: #3b2516;
    font-size: 56px;
    font-weight: 900;
    padding: 16px 36px;
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
  }
</style>
<div class="bk-card-1">
  <p class="bk1-eyebrow">Guten Morgen</p>
  <div class="bk1-icons">
    <span>🥐</span>
    <span class="bk1-cup">☕</span>
  </div>
  <h1>Frühstück to go</h1>
  <p class="bk1-sub">Buttercroissant + Filterkaffee, frisch aus dem Ofen</p>
  <div class="bk1-price">3,90&nbsp;€</div>
</div>
