<style>
  .bk-card-6 {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(140deg, #6b3410 0%, #b56a2c 55%, #e8a85a 100%);
    color: #fff4d8;
    padding: 72px 56px;
    border-radius: 28px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }
  .bk-card-6 .bk6-eyebrow {
    text-transform: uppercase;
    letter-spacing: 6px;
    font-size: 14px;
    opacity: 0.75;
    margin: 0 0 16px;
  }
  .bk-card-6 .bk6-icon-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 8px;
  }
  .bk-card-6 .bk6-icon {
    font-size: 140px;
    line-height: 1;
    display: inline-block;
    animation: bk6-bowl 3s ease-in-out infinite;
  }
  @keyframes bk6-bowl {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }
  .bk-card-6 .bk6-steam {
    position: absolute;
    top: -20px;
    left: 50%;
    width: 16px;
    height: 70px;
    margin-left: -8px;
    background: radial-gradient(ellipse at center, rgba(255, 244, 216, 0.6), transparent 70%);
    border-radius: 50%;
    filter: blur(7px);
    opacity: 0;
    animation: bk6-steam 3.2s ease-out infinite;
  }
  .bk-card-6 .bk6-steam.s2 { left: 42%; animation-delay: 1s;  }
  .bk-card-6 .bk6-steam.s3 { left: 58%; animation-delay: 2s;  }
  @keyframes bk6-steam {
    0%   { transform: translateY(20px) scale(0.5); opacity: 0; }
    30%  { opacity: 0.7; }
    100% { transform: translateY(-90px) scale(1.6); opacity: 0; }
  }
  .bk-card-6 h1 {
    font-size: 64px;
    margin: 24px 0 8px;
    font-weight: 800;
    letter-spacing: -1.5px;
  }
  .bk-card-6 .bk6-sub {
    font-size: 26px;
    opacity: 0.9;
    margin: 0 0 32px;
  }
  .bk-card-6 .bk6-price {
    display: inline-block;
    background: #fff4d8;
    color: #6b3410;
    font-size: 56px;
    font-weight: 900;
    padding: 16px 36px;
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }
</style>
<div class="bk-card-6">
  <p class="bk6-eyebrow">Mittagspause</p>
  <div class="bk6-icon-wrap">
    <span class="bk6-steam"></span>
    <span class="bk6-steam s2"></span>
    <span class="bk6-steam s3"></span>
    <span class="bk6-icon">🍲</span>
  </div>
  <h1>Suppe & Brötchen</h1>
  <p class="bk6-sub">Suppe des Tages mit frischem Bauernbrötchen</p>
  <div class="bk6-price">4,90&nbsp;€</div>
</div>
