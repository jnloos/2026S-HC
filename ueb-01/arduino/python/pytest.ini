[pytest]
# The Arduino App's Python lives in this directory and is on sys.path when the
# App runs on-board. Make `tests/` import the audience modules the same way
# off-board. NOTE: do not import main.py here — `arduino.app_utils` /
# `arduino.app_bricks` are only available on the board.
testpaths = tests
pythonpath = .
addopts = -q
